# Khong nhan file /etc/resolv.conf cua container/host.
no-resolv

# Khong forward ten ngan khong co domain va reverse lookup private ra internet.
domain-needed
bogus-priv

# DNS upstream de phan giai cac domain internet ngoai.
server=8.8.8.8
server=8.8.4.4
server=1.1.1.1

# Cache cau tra loi de giam latency va request ra upstream.
cache-size=1000
local-ttl=60

# Ban ghi noi bo.
host-record=gitlab.vnpay.com,172.23.1.16
host-record=harbor.vnpay.com,172.23.1.17
host-record=lldap.vnpay.com,172.23.1.18
