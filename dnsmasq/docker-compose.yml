services:
  dnsmasq:
    image: jpillora/dnsmasq:latest
    container_name: dnsmasq
    restart: unless-stopped
    environment:
      HTTP_USER: ${HTTP_USER:?Set HTTP_USER in .env}
      HTTP_PASS: ${HTTP_PASS:?Set HTTP_PASS in .env}
    ports:
      # DNS service. Bind vao IP LAN de tranh conflict voi systemd-resolved tren 127.0.0.53.
      - "${DNS_BIND_IP:?Set DNS_BIND_IP in .env}:53:53/udp"
      - "${DNS_BIND_IP:?Set DNS_BIND_IP in .env}:53:53/tcp"
      # Web UI. Doi thanh "127.0.0.1:5380:8080" neu chi muon truy cap local/tunnel.
      - "5380:8080"
    volumes:
      - ./dnsmasq.conf:/etc/dnsmasq.conf:ro
